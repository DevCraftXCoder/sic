# SIC Admin UI — nginx IP allowlist
# Generated from: sic/cf-config/ip-allowlist.json
#
# Usage: include this file inside your nginx http {} block, then protect
# the admin location as shown below.
#
# Example server block:
#
#   server {
#       listen 443 ssl;
#       server_name sic.yourdomain.com;
#
#       include /path/to/sic/cf-config/nginx-ip-allowlist.conf;
#
#       location / {
#           if ($sic_allowed = 0) { return 403; }
#           proxy_pass http://127.0.0.1:9888;
#       }
#   }

geo $sic_allowed {
    default         0;
    127.0.0.1/8     1;
    ::1             1;
    # --- Add your allowed IPs / CIDRs above this line ---
    # Examples:
    #   203.0.113.5/32     1;   # My home IP
    #   10.10.0.0/16       1;   # VPN range
}
